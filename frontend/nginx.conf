server {
  listen 443 ssl;
  server_name localhost;
  ssl_certificate    /etc/nginx/cert.pem;
  ssl_certificate_key /etc/nginx/key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }
}